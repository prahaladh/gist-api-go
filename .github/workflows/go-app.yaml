name: ci

on:
  push:
    branches: main

jobs:
  build:
    environment: production
    runs-on: self-hosted
    steps:

      - name: Set variable from file
        run: echo "app_name=gist-api-go" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Test this code before building
        run: go test ./...  && echo "Test case if success"; exit 0 || ( echo "Test cases failed..."; exit 1)
      
      - name: docker login
        run: docker login ${{ vars.HARBOR_IP }} -u '${{ vars.HARBOR_ROBOT_USER }}' -p ${{ secrets.HARBOR_SECRET }}

      - name: HELM login
        run: helm registry login ${{ vars.HARBOR_IP }} -u '${{ vars.HARBOR_ROBOT_USER }}' -p ${{ secrets.HARBOR_SECRET }} --plain-http
      

      - name: Set env
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c 1-6)
          VERSION=$(grep 'APP_VERSION' mainfest.mf | cut -d '=' -f2 | tr -d ' ')
          echo "IMAGE_TAG=${VERSION}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "GITHUB_SHA_SHORT=${SHORT_SHA}" >> $GITHUB_ENV
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: docker build
        run: docker build --build-arg VERSION=${{ env.APP_VERSION }} --build-arg GIT_COMMIT=${{ env.GITHUB_SHA_SHORT }} -t ${{ vars.HARBOR_IP }}/${{ env.app_name }}/${{ env.app_name }}:${{ env.IMAGE_TAG }} .
      - name: docker push
        run: docker push ${{ vars.HARBOR_IP }}/${{ env.app_name }}/${{ env.app_name }}:${{ env.IMAGE_TAG }}

      - name: Helm Package & Push
        run: |
         helm package helm --version ${{ env.APP_VERSION }} --app-version ${{ env.APP_VERSION }}
         helm push ${{ env.app_name }}-${{ env.APP_VERSION }}.tgz oci://${{ vars.HARBOR_IP }}/${{ env.app_name }} --plain-http