name: ci

on:
  push:
    branches: main

jobs:
  build:
    environment: production
    runs-on: self-hosted
    steps:

      - name: Test this code before building
        run: go test ../.. . && echo "Test case if success"; exit 0 || ( echo "Test cases failed..."; exit 1)
      -
        name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push the image to docker hub
        uses: docker/build-push-action@v6
        with:
          tags: ${{ secrets.DOCKER_REGISTRY }}:${{ env.GITHUB_SHA }}
          build-args: GO_BASE_IMAGE=${{ vars.DOCKER_BASE_IMAGE }}